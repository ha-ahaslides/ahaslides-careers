<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AhaSlides Careers</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #ffffff;
      color: #1f2937;
    }

    a { text-decoration: none; color: inherit; }

    .container {
      width: min(1200px, calc(100% - 40px));
      margin: auto;
    }

    img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 16px;
      display: block;
    }

    .navbar {
      position: sticky;
      top: 0;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      z-index: 999;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 20px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg,#7c3aed,#ec4899,#06b6d4);
    }

    .nav-links {
      display: flex;
      gap: 20px;
      font-size: 14px;
      color: #6b7280;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 600;
      background: linear-gradient(135deg,#7c3aed,#ec4899);
      color: white;
    }

    .hero {
      padding: 100px 0;
      background: linear-gradient(180deg,#ffffff,#f9fafb);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 40px;
      align-items: center;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      color: #6b7280;
    }

    .section {
      padding: 80px 0;
    }

    .title {
      font-size: 34px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 24px;
      margin-top: 30px;
    }

    .card {
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 20px;
      background: white;
    }

    footer {
      background: #f9fafb;
      padding: 40px 0;
      margin-top: 60px;
      border-top: 1px solid #e5e7eb;
    }

    .footer-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: #4b5563;
    }

    @media(max-width:900px){
      .grid, .hero-grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 34px; }
    }
  </style>
</head>

<body>

<header class="navbar">
  <div class="container nav-inner">
    <div class="brand">
      <div class="logo"></div>
      AhaSlides Careers
    </div>

    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#jobs">Jobs</a>
      <a href="#culture">Culture</a>
    </div>

    <a href="#" class="btn">View Jobs</a>
  </div>
</header>

<section class="hero">
  <div class="container hero-grid">
    <div>
      <h1>Join AhaSlides — Build Global Impact</h1>
      <p>Work on a global product and grow with a strong team.</p>
    </div>

    <img src="https://images.unsplash.com/photo-1557804506-669a67965ba0?q=80&w=1200" />
  </div>
</section>

<section id="culture" class="section">
  <div class="container">
    <h2 class="title">Culture</h2>

    <div class="grid">
      <div class="card">
        <img src="culture/_MG_2129.jpg" alt="">
        <h3>Teamwork</h3>
      </div>

      <div class="card">
        <img src="culture/DSC04852-Enhanced-NR.jpg" alt="">
        <h3>Fun</h3>
      </div>

      <div class="card">
        <img src="culture/DSC07507.jpg" alt="">
        <h3>Moments</h3>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="container footer-content">
    <div>✉️ ha@ahaslides.com</div>
    <div>📞 0977544062</div>
    <div>📍 20A Tanjong Pagar Rd, Singapore 088443</div>
    <div>📍 105 Lang Ha St, Hanoi, Vietnam</div>
    <div>🔗 ahaslides.com</div>
  </div>
</footer>

</body>
</html>
